# Internal model config for the built-in multilingual DistilBERT NER runtime.
# Paths are relative to this file's directory (`models/`).
# The bundle contract stays strict:
# - tokenizer.json
# - config.json
# - onnx/model_quantized.onnx

hf_repo = "Xenova/distilbert-base-multilingual-cased-ner-hrl"
model_dir = "distilbert-base-multilingual-cased-ner-hrl"
max_tokens = 512
overlap_tokens = 128

[recognizers]
date_time = true

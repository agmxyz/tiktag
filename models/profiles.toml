# Internal model config for the built-in eu_pii runtime.
# Paths are relative to this file's directory (`models/`).
# The bundle contract stays strict:
# - tokenizer.json
# - config.json
# - onnx/model_quantized.onnx

default_profile = "eu_pii"

[profiles.eu_pii]
hf_repo = "bardsai/eu-pii-anonimization-multilang"
model_dir = "eu-pii-anonimization-multilang"
max_tokens = 512
overlap_tokens = 128
